# WebFeedReports — Source definitions
#
# This file is the declarative seed list of RSS feeds and web pages to ingest.
# Delivery model (Option B): this file is published to Blob Storage at deploy time
# and read by the worker at runtime via Managed Identity. The worker seeds the
# source registry (Table Storage) from this file. The registry is the runtime
# source of truth, so sources may also be enabled/disabled via the API later.
#
# Schema:
#   version: schema version (int)
#   defaults: optional default values applied to every source
#   sources: list of source entries
#     id:       unique slug (required, [a-z0-9-])
#     type:     "rss" | "web" (required)
#     url:      absolute http(s) URL (required)
#     enabled:  bool (default true)
#     schedule: cron expression for polling cadence (optional; falls back to defaults)
#     tags:     list of free-form labels (optional)
#     crawl:    web-only options
#       depth:  link-follow depth, 0 = only the given page (default 0)
#       max_pages: safety cap on pages per run (optional)
#
# NOTE: The web ingester snapshots a SINGLE page (crawl.depth/max_pages are not
# yet honoured). Prefer "rss" where a real feed exists.

version: 1

defaults:
  enabled: true
  schedule: "0 */6 * * *" # every 6 hours

sources:
  # ── Focus businesses ───────────────────────────────────────────────
  - id: airbus-press
    type: web
    url: https://www.airbus.com/en/newsroom/press-releases
    tags: [airbus, defence, supplier, business]

  - id: boeing-press
    type: rss
    url: https://boeing.mediaroom.com/news-releases-statements?pagetemplate=rss&category=1
    tags: [boeing, defence, supplier, business]

  - id: leonardo-press
    type: web
    url: https://www.leonardo.com/en/media-hub/press-releases
    tags: [leonardo, defence, supplier, business]

  # ── Aviation safety & regulators ───────────────────────────────────
  - id: aaib-reports
    type: rss
    url: https://www.gov.uk/aaib-reports.atom
    tags: [aviation-safety, uk, air-accidents]

  - id: caa-cap722
    type: web
    url: https://www.caa.co.uk/our-work/publications/documents/content/cap722/
    tags: [caa, uk, regulation, uas]

  - id: easa-press-releases
    type: rss
    url: https://www.easa.europa.eu/en/newsroom-and-events/press-releases/feed.xml
    tags: [easa, eu, aviation-safety]

  - id: eurocontrol-ead
    type: web
    url: https://www.eurocontrol.int/service/european-ais-database
    tags: [eurocontrol, eu, aviation, ais]

  - id: nats-uk-aip
    type: web
    url: https://nats-uk.ead-it.com/cms-nats/opencms/en/Publications/digital-datasets/
    tags: [nats, uk, aviation, aip]

  # ── Defence & arms transfers ───────────────────────────────────────
  - id: eda-edf
    type: web
    url: https://eda.europa.eu/what-we-do/EU-defence-initiatives/european-defence-fund-(edf)
    tags: [eda, eu, defence, funding]

  - id: occar
    type: web
    url: https://www.occar.int/
    tags: [occar, eu, defence, procurement]

  - id: sipri-arms-transfers
    type: web
    url: https://www.sipri.org/databases/armstransfers
    tags: [sipri, defence, arms-transfers]

  - id: unroca
    type: web
    url: https://www.unroca.org/
    tags: [un, defence, arms-transfers]

  # ── Legal notices ──────────────────────────────────────────────────
  - id: the-gazette
    type: rss
    url: https://www.thegazette.co.uk/all-notices/notice/data.feed
    tags: [uk, legal-notices, gazette]

# ════════════════════════════════════════════════════════════════════
# FUTURE API SOURCES (not yet active)
# ════════════════════════════════════════════════════════════════════
# These are structured REST APIs, not RSS/web pages. They require a new
# "api" source type + per-provider connector in the worker before they can
# be enabled. Kept here as a backlog. Do NOT uncomment until that connector
# exists — a plain web GET of these returns JSON/docs, not usable content.
#
# ── Keyless (Phase 1 — no account, no infra change) ──────────────────
#   cordis-projects         https://cordis.europa.eu/projects           # EU research projects
#   gtr-ukri                https://gtr.ukri.org/resources/api.html      # UKRI Gateway to Research
#   data-gov-uk             https://www.data.gov.uk/                     # UK open-data (CKAN API)
#   gov-uk-contracts-finder https://www.gov.uk/contracts-finder          # UK tenders (OCDS API)
#   ted-europa              https://ted.europa.eu/en/api                 # EU tenders (public search)
#
# ── Authenticated (Phase 2 — account + API key, store in Key Vault) ──
#   companies-house         https://developer.company-information.service.gov.uk/
#       Free. Register dev account -> create app -> REST API key (HTTP Basic username).
#   sam-gov-opportunities   https://open.gsa.gov/api/get-opportunities-public-api/
#       Free. Needs Login.gov + SAM.gov account -> request public API key (api.data.gov).
#   epo-ops                 https://www.epo.org/en/searching-for-patents/data/web-services/ops
#       Free tier (fair-use quota). EPO account -> register app -> OAuth2 key + secret.
#   opencorporates          https://api.opencorporates.com/
#       Paid/commercial (apply for account/token). Companies House covers UK for free.
#
# ── No clean public API (stay web / manual for now) ──────────────────
#   wipo-patentscope        https://patentscope.wipo.int/search/en/search.jsf  # search UI only
#   gov-uk-search-patent    https://www.gov.uk/search-for-patent               # search UI only
#
# ── Blocked by bot protection (not fetchable by the worker) ──────────
#   dsca-arms-sales         https://www.dsca.mil/press-media/major-arms-sales
#       US major arms sales. Returns HTTP 403 to the worker (JS/WAF challenge),
#       even with a browser User-Agent. Needs a headless-browser fetch to ingest.
