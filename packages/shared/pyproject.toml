[project]
name = "webfeed-shared"
version = "0.1.0"
description = "Shared models, contracts and utilities for WebFeedReports"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["webfeed_shared"]
