[project]
name = "webfeed-platform"
version = "0.1.0"
description = "Platform layer: config, identity, observability and Azure clients"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "azure-identity>=1.17",
    "azure-storage-blob>=12.20",
    "azure-data-tables>=12.5",
    "azure-search-documents>=11.5",
    "azure-servicebus>=7.12",
    "openai>=1.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["webfeed_platform"]
