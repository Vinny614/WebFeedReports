[project]
name = "webfeed-domain"
version = "0.1.0"
description = "Domain logic: sources, ingestion, extraction, indexing, query, reporting"
requires-python = ">=3.11"
dependencies = [
    "webfeed-shared",
    "webfeed-platform",
    "pydantic>=2.7",
    "httpx>=0.27",
    "feedparser>=6.0",
    "beautifulsoup4>=4.12",
    "trafilatura>=1.10",
    "lxml>=5.2",
    "tenacity>=8.5",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["webfeed_domain"]
